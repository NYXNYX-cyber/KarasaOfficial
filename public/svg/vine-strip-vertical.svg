<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 800" fill="none">
  <!--
    Vertical vine strip — sulur vertikal dengan daun kecil dan bunga,
    dipasang sebagai border samping kiri/kanan hero.
    Pattern 80×800, repeat vertikal.
  -->
  <defs>
    <linearGradient id="vineFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E8D0" stop-opacity="1" />
      <stop offset="10%" stop-color="#F5E8D0" stop-opacity="0" />
      <stop offset="90%" stop-color="#F5E8D0" stop-opacity="0" />
      <stop offset="100%" stop-color="#F5E8D0" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Sulur utama vertikal -->
  <path
    d="M40,0 Q20,80 40,160 Q60,240 40,320 Q20,400 40,480 Q60,560 40,640 Q20,720 40,800"
    stroke="#8B6B3F"
    stroke-width="1.2"
    fill="none"
    opacity="0.5"
  />

  <!-- Daun di sepanjang sulur (alternate kiri-kanan) -->
  <g fill="#B8935A" stroke="#8B6B3F" stroke-width="0.5" opacity="0.7">
    <path d="M40,80 Q25,70 20,82 Q25,94 40,90 Z" />
    <path d="M40,180 Q55,170 60,182 Q55,194 40,190 Z" />
    <path d="M40,280 Q25,270 20,282 Q25,294 40,290 Z" />
    <path d="M40,380 Q55,370 60,382 Q55,394 40,390 Z" />
    <path d="M40,480 Q25,470 20,482 Q25,494 40,490 Z" />
    <path d="M40,580 Q55,570 60,582 Q55,594 40,590 Z" />
    <path d="M40,680 Q25,670 20,682 Q25,694 40,690 Z" />
  </g>

  <!-- Bunga kecil di beberapa titik -->
  <g fill="#B8935A" stroke="#8B6B3F" stroke-width="0.5" opacity="0.8">
    <g transform="translate(40, 130)">
      <ellipse cx="0" cy="-5" rx="2" ry="4" />
      <ellipse cx="4" cy="-2.5" rx="2" ry="4" transform="rotate(60)" />
      <ellipse cx="4" cy="2.5" rx="2" ry="4" transform="rotate(120)" />
      <ellipse cx="0" cy="5" rx="2" ry="4" />
      <ellipse cx="-4" cy="2.5" rx="2" ry="4" transform="rotate(-120)" />
      <ellipse cx="-4" cy="-2.5" rx="2" ry="4" transform="rotate(-60)" />
      <circle cx="0" cy="0" r="1.2" fill="#F5E8D0" />
    </g>
    <g transform="translate(40, 430)">
      <ellipse cx="0" cy="-5" rx="2" ry="4" />
      <ellipse cx="4" cy="-2.5" rx="2" ry="4" transform="rotate(60)" />
      <ellipse cx="4" cy="2.5" rx="2" ry="4" transform="rotate(120)" />
      <ellipse cx="0" cy="5" rx="2" ry="4" />
      <ellipse cx="-4" cy="2.5" rx="2" ry="4" transform="rotate(-120)" />
      <ellipse cx="-4" cy="-2.5" rx="2" ry="4" transform="rotate(-60)" />
      <circle cx="0" cy="0" r="1.2" fill="#F5E8D0" />
    </g>
  </g>

  <!-- Dot kecil -->
  <g fill="#B8935A" opacity="0.5">
    <circle cx="20" cy="40" r="1" />
    <circle cx="60" cy="240" r="1.2" />
    <circle cx="20" cy="540" r="1" />
    <circle cx="60" cy="740" r="1.2" />
  </g>

  <!-- Fade di tepi -->
  <rect x="0" y="0" width="80" height="800" fill="url(#vineFade)" />
</svg>
