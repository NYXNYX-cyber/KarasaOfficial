<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <!--
    Siluet Kujang — senjata pusaka Sunda.
    Anatomi: 3 lob utama (papatuk di tengah, 2 silih di sayap) + 5 mata hierarkis
    (1 pusat besar, 2 atas, 2 bawah — mewakili Panca Niti).
    Di-redraw dari studi anatomi (bukan salinan) untuk konsistensi merek Karasa.
    Ref: freesvg.org/kujang (ID 160931, Public Domain) untuk referensi proporsi.
  -->

  <!-- Gagang bawah (kayu Sonokeling) -->
  <rect x="86" y="280" width="28" height="100" rx="4" fill="#5C3A21" />

  <!-- Haluan / mata pisau utama -->
  <!-- Bilah tengah (papatuk) -->
  <path
    d="M100,30
       C110,40 116,55 118,75
       C120,90 116,105 110,115
       C115,125 122,140 124,155
       C126,170 122,185 115,195
       C118,205 122,215 124,230
       C126,250 120,265 110,275
       L100,275
       L100,30 Z"
    fill="currentColor"
  />

  <!-- Sayap kanan (silih) -->
  <path
    d="M100,75
       C115,70 130,72 145,80
       C158,90 168,105 170,125
       C172,140 168,155 160,165
       C155,170 145,170 135,165
       C130,160 122,150 118,140
       C116,125 110,110 105,95
       C102,85 100,80 100,75 Z"
    fill="currentColor"
  />

  <!-- Sayap kiri (silih) — mirror -->
  <path
    d="M100,75
       C85,70 70,72 55,80
       C42,90 32,105 30,125
       C28,140 32,155 40,165
       C45,170 55,170 65,165
       C70,160 78,150 82,140
       C84,125 90,110 95,95
       C98,85 100,80 100,75 Z"
    fill="currentColor"
  />

  <!-- Lob pamor (paling bawah, dekoratif) -->
  <path
    d="M100,230
       C112,232 122,240 128,250
       C132,260 130,270 124,275
       L100,275
       L100,230 Z"
    fill="currentColor"
  />
  <path
    d="M100,230
       C88,232 78,240 72,250
       C68,260 70,270 76,275
       L100,275
       L100,230 Z"
    fill="currentColor"
  />

  <!-- 5 mata hierarkis (Panca Niti) — dilubangi -->
  <g fill="white">
    <circle cx="100" cy="120" r="10" />
    <circle cx="80" cy="135" r="6" />
    <circle cx="120" cy="135" r="6" />
    <circle cx="88" cy="170" r="5" />
    <circle cx="112" cy="170" r="5" />
  </g>

  <!-- Aksen pamor (garis-garis tipikal baja tempa) -->
  <g stroke="white" stroke-width="1" opacity="0.6" fill="none">
    <path d="M100,40 L100,90" />
    <path d="M70,90 L100,100" />
    <path d="M130,90 L100,100" />
    <path d="M60,130 L100,140" />
    <path d="M140,130 L100,140" />
  </g>
</svg>
