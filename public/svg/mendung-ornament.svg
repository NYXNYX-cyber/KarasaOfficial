<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <!--
    Mega Mendung (Cirebon) — versi dekoratif emas untuk brand Karasa.
    5 lapis awan bertingkat + sulur-sulur + percikan bintang (PRD §3.1).
    Warna: emas tua #8B6B3F stroke + emas muda #D4B27E fill transparan.
  -->

  <defs>
    <linearGradient id="awanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B27E" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#B8935A" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Awan Lapis 1 (paling atas, kecil) -->
  <g stroke="#8B6B3F" stroke-width="1.5" fill="url(#awanGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180,120 Q200,100 220,110 Q240,90 270,100 Q290,85 320,100 Q350,90 380,110 Q410,100 420,120 Q425,135 410,140 Q380,135 350,140 Q320,135 290,140 Q260,135 230,140 Q200,135 185,135 Z" />
  </g>

  <!-- Awan Lapis 2 -->
  <g stroke="#8B6B3F" stroke-width="1.5" fill="url(#awanGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M140,180 Q170,150 200,165 Q230,140 270,160 Q310,140 350,160 Q390,145 430,170 Q470,160 490,180 Q495,200 470,210 Q430,200 390,210 Q350,200 310,210 Q270,200 230,210 Q190,200 160,205 Q135,200 140,180 Z" />
  </g>

  <!-- Awan Lapis 3 (tengah, paling dominan) -->
  <g stroke="#8B6B3F" stroke-width="2" fill="url(#awanGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M100,260 Q140,220 180,240 Q220,210 270,235 Q320,210 370,235 Q420,215 470,245 Q510,225 530,260 Q535,290 500,300 Q460,290 420,300 Q380,290 340,300 Q300,290 260,300 Q220,290 180,300 Q140,290 110,295 Q90,290 100,260 Z" />
  </g>

  <!-- Awan Lapis 4 -->
  <g stroke="#8B6B3F" stroke-width="1.5" fill="url(#awanGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M130,340 Q170,310 210,325 Q250,300 300,320 Q350,305 400,330 Q450,315 490,345 Q510,335 520,355 Q515,380 480,385 Q440,380 400,385 Q360,380 320,385 Q280,380 240,385 Q200,380 160,385 Q130,375 130,340 Z" />
  </g>

  <!-- Awan Lapis 5 (paling bawah, lebar) -->
  <g stroke="#8B6B3F" stroke-width="1.5" fill="url(#awanGrad)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M100,420 Q150,395 200,410 Q250,390 300,410 Q350,395 400,415 Q450,400 500,420 Q540,410 555,430 Q545,450 510,455 Q470,450 430,455 Q390,450 350,455 Q310,450 270,455 Q230,450 190,455 Q150,450 115,450 Q95,445 100,420 Z" />
  </g>

  <!-- Sulur-sulur kecil (khas batik Cirebon) -->
  <g stroke="#8B6B3F" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M50,150 Q70,140 80,155" />
    <path d="M55,200 Q75,195 85,210" />
    <path d="M60,250 Q80,245 90,260" />
    <path d="M555,250 Q540,245 530,260" />
    <path d="M560,300 Q540,295 530,310" />
    <path d="M555,350 Q540,345 530,360" />
  </g>

  <!-- Percikan bintang (sparkle elements) -->
  <g fill="#B8935A">
    <!-- 4-pointed star kecil-kecil di sekitar awan -->
    <g transform="translate(70, 100)" class="animate-sparkle">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" />
    </g>
    <g transform="translate(50, 350)" class="animate-sparkle" style="animation-delay: 0.4s">
      <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" />
    </g>
    <g transform="translate(80, 480)" class="animate-sparkle" style="animation-delay: 0.8s">
      <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" />
    </g>
    <g transform="translate(540, 180)" class="animate-sparkle" style="animation-delay: 1.2s">
      <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" />
    </g>
    <g transform="translate(560, 420)" class="animate-sparkle" style="animation-delay: 0.6s">
      <path d="M0,-7 L1.7,-1.7 L7,0 L1.7,1.7 L0,7 L-1.7,1.7 L-7,0 L-1.7,-1.7 Z" />
    </g>
    <g transform="translate(500, 90)" class="animate-sparkle" style="animation-delay: 1.6s">
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" />
    </g>
  </g>

  <!-- Dot kecil-kecil untuk texture -->
  <g fill="#B8935A" opacity="0.5">
    <circle cx="40" cy="180" r="1.5" />
    <circle cx="30" cy="280" r="1" />
    <circle cx="570" cy="150" r="1.5" />
    <circle cx="580" cy="320" r="1" />
    <circle cx="40" cy="420" r="1.2" />
    <circle cx="570" cy="500" r="1.2" />
  </g>
</svg>
