<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <!--
    Ornamental scrollwork / flourish — pita dekoratif dengan sulur, daun, dan bunga
    khas Sunda-Cirebon. Digunakan di bawah logo KARASÁ.
    Warna: emas gradient (tua ke muda ke tua).
  -->
  <defs>
    <linearGradient id="flourishGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6B3F" stop-opacity="0" />
      <stop offset="15%" stop-color="#8B6B3F" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#B8935A" stop-opacity="1" />
      <stop offset="85%" stop-color="#8B6B3F" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8B6B3F" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Center: bunga stilasi 6-petal -->
  <g transform="translate(200, 30)" fill="url(#flourishGrad)" stroke="#8B6B3F" stroke-width="0.8">
    <!-- 6 kelopak bunga -->
    <ellipse cx="0" cy="-10" rx="5" ry="9" />
    <ellipse cx="9" cy="-5" rx="5" ry="9" transform="rotate(60)" />
    <ellipse cx="9" cy="5" rx="5" ry="9" transform="rotate(120)" />
    <ellipse cx="0" cy="10" rx="5" ry="9" />
    <ellipse cx="-9" cy="5" rx="5" ry="9" transform="rotate(-120)" />
    <ellipse cx="-9" cy="-5" rx="5" ry="9" transform="rotate(-60)" />
    <!-- Pusat bunga -->
    <circle cx="0" cy="0" r="3" fill="#D4B27E" stroke="#8B6B3F" stroke-width="0.5" />
    <circle cx="0" cy="0" r="1.2" fill="#8B6B3F" stroke="none" />
  </g>

  <!-- Sulur kiri — melengkung keluar dari bunga -->
  <g stroke="url(#flourishGrad)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M195,30 Q170,30 150,22 Q130,14 100,18 Q80,22 60,30" />
    <!-- Daun kecil di sulur kiri -->
    <path d="M150,22 Q145,15 152,12" fill="url(#flourishGrad)" />
    <path d="M100,18 Q95,11 102,8" fill="url(#flourishGrad)" />
    <!-- Dot bunga kecil -->
    <circle cx="120" cy="18" r="2" fill="url(#flourishGrad)" />
    <circle cx="80" cy="24" r="1.5" fill="url(#flourishGrad)" />
  </g>

  <!-- Sulur kanan — mirror -->
  <g stroke="url(#flourishGrad)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M205,30 Q230,30 250,22 Q270,14 300,18 Q320,22 340,30" />
    <path d="M250,22 Q255,15 248,12" fill="url(#flourishGrad)" />
    <path d="M300,18 Q305,11 298,8" fill="url(#flourishGrad)" />
    <circle cx="280" cy="18" r="2" fill="url(#flourishGrad)" />
    <circle cx="320" cy="24" r="1.5" fill="url(#flourishGrad)" />
  </g>

  <!-- Garis horizontal samar di bawah flourish -->
  <line
    x1="60"
    y1="50"
    x2="340"
    y2="50"
    stroke="url(#flourishGrad)"
    stroke-width="0.5"
    stroke-dasharray="1,3"
  />
</svg>
